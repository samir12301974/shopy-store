<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN VOID | Store</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 40px 0; max-width: 1000px; margin: 0 auto; }
        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #555; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        h2 { font-size: 1.1rem; margin: 10px 0; }
        .price { color: #aaa; margin-bottom: 15px; font-weight: bold; }
        .btn-placeholder { background: #fff; color: #000; padding: 10px 20px; border-radius: 5px; font-size: 12px; text-transform: uppercase; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>URBAN VOID</h1>
</header>

<div class="grid">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7" alt="Hoodie">
        <h2>VOID-01 HOODIE</h2>
        <p class="price">$85</p>
        <div class="btn-placeholder">Скоро в наличии</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1624378439575-d8705ad7e803" alt="Jacket">
        <h2>STRUCT JACKET</h2>
        <p class="price">$120</p>
        <div class="btn-placeholder">Скоро в наличии</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1" alt="Tee">
        <h2>CORE TEE</h2>
        <p class="price">$45</p>
        <div class="btn-placeholder">Скоро в наличии</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1591195853828-11db59a44f6b" alt="Cargo">
        <h2>CARO CARGO PANTS</h2>
        <p class="price">$95</p>
        <div class="btn-placeholder">Скоро в наличии</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1581605405669-f1481c57c18b" alt="Bag">
        <h2>VOID UTILITY BAG</h2>
        <p class="price">$35</p>
        <div class="btn-placeholder">Скоро в наличии</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1577401138243-7f9754f9104c" alt="Belt">
        <h2>TECH TAPE BELT</h2>
        <p class="price">$30</p>
        <div class="btn-placeholder">Скоро в наличии</div>
    </div>
</div>

</body>
</html>
