<!DOCTYPE html>
<html lang="ru">
<head>

        .card { background: #111; padding: 10px; border-radius: 12px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }

        h2 { font-size: 0.8rem; margin: 10px 0 5px; }
        .price { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        
        /* Скрытая форма PayPal */
        .cart-btn { background: #ffc439; color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>

    </div>

        <button class="cart-btn" onclick="alert('Переход к оплате PayPal')">BUY NOW</button>

</div>

</html>
