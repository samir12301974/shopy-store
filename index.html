<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN VOID</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        header { padding: 20px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #111; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; border-top: 1px solid #333; padding: 15px 0; }
    </style>
</head>
<body>
<header>URBAN VOID</header>
<div class="grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7"><h2>HOODIE</h2><p>$85</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1544923246-77be07ef3443"><h2>JACKET</h2><p>$120</p></div>
</div>
<div class="footer">
    <div>🏠</div><div>🛍️</div><div>🛒</div><div>👤</div>
</div>
</body>
</html>
