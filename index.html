<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN VOID | Store</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Helvetica Neue', sans-serif; margin: 0; padding-bottom: 70px; }
        header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #222; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #161616; border: 1px solid #333; padding: 10px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; }
        h2 { font-size: 0.9rem; margin: 10px 0 5px; }
        .price { color: #888; font-size: 0.85rem; margin-bottom: 10px; }
        .btn { background: #fff; color: #000; border: none; padding: 8px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #111; padding: 15px 0; border-top: 1px solid #333; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <div>≡</div>
    <div style="font-weight: bold; font-size: 1.2rem; letter-spacing: 2px;">URBAN VOID</div>
    <div>🛒</div>
</header>

<div class="grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7"><h2>VOID-01 HOODIE</h2><p class="price">$85</p><button class="btn">VIEW</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1624378439575-d8705ad7e803"><h2>STRUCT JACKET</h2><p class="price">$120</p><button class="btn">VIEW</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1"><h2>CORE TEE</h2><p class="price">$45</p><button class="btn">VIEW</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1591195853828-11db59a44f6b"><h2>CARO CARGO</h2><p class="price">$95</p><button class="btn">VIEW</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1581605405669-f1481c57c18b"><h2>UTILITY BAG</h2><p class="price">$35</p><button class="btn">VIEW</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1577401138243-7f9754f9104c"><h2>TECH BELT</h2><p class="price">$30</p><button class="btn">VIEW</button></div>
</div>

<nav class="footer-nav">
    <div>🏠 HOME</div>
    <div>🛍️ SHOP</div>
    <div>🛒 CART</div>
    <div>👤 ACCOUNT</div>
</nav>

</body>
</html>
